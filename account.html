<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Account — The Barham Lakes</title>
<style>
:root{--green:#1f6f54;--green-d:#164f3d;--ink:#1b1d18;--mute:#6b6d63;--line:#e3e0d6;--cream:#f6f3ea;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;color:var(--ink);background:var(--cream);line-height:1.55;}
.wrap{max-width:560px;margin:0 auto;padding:0 22px;}
header.nav{background:var(--ink);color:#fff;}
.nav-in{display:flex;align-items:center;justify-content:space-between;height:64px;max-width:1180px;margin:0 auto;padding:0 22px;}
.brand{font-weight:700;font-size:17px;}.brand small{display:block;font-size:9px;letter-spacing:.28em;color:#b9bcae;}
.nav-in a{color:#e7e4d7;text-decoration:none;font-size:14px;}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:26px;margin-top:30px;}
h1{font-size:24px;margin-bottom:4px;}
.sub{color:var(--mute);font-size:14px;margin-bottom:18px;}
.toggle{display:flex;gap:6px;margin-bottom:18px;}
.toggle button{flex:1;padding:9px;border:1px solid var(--line);background:var(--cream);border-radius:6px;cursor:pointer;font:inherit;font-weight:600;}
.toggle button.active{background:var(--green);color:#fff;border-color:var(--green);}
label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--mute);margin:12px 0 4px;}
input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:6px;font:inherit;}
.btn{display:block;width:100%;text-align:center;background:var(--green);color:#fff;border:0;border-radius:6px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:18px;}
.btn:hover{background:var(--green-d);}.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);}
.msg{margin-top:14px;font-size:13.5px;padding:10px 12px;border-radius:6px;display:none;}
.msg.err{background:#f7e1dd;color:#a23b2c;display:block;}.msg.ok{background:#e6f2ec;color:var(--green-d);display:block;}
.bk{border:1px solid var(--line);border-radius:8px;padding:14px;margin-top:12px;}
.bk .top{display:flex;justify-content:space-between;font-weight:700;}
.pill{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 9px;border-radius:20px;}
.pill.pending{background:#fbeecb;color:#8a6d18;}.pill.confirmed{background:#e0f0e7;color:var(--green-d);}.pill.cancelled{background:#eee;color:#888;}
.bk .meta{font-size:13px;color:var(--mute);margin-top:4px;}
.row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.link{color:var(--green);text-decoration:none;font-weight:600;font-size:14px;cursor:pointer;}
</style>
</head>
<body>
<header class="nav"><div class="nav-in">
  <a href="index.html" style="text-decoration:none;"><span class="brand">The Barham Lakes<small>EST. 2018 · SUFFOLK</small></span></a>
  <nav style="display:flex;gap:20px;"><a href="index.html">Home</a><a href="bookings.html">Book</a><a href="syndicate.html">Syndicate</a><a href="about.html">About</a></nav>
</div></header>

<div class="wrap">
  <!-- Signed-out: auth -->
  <div class="card" id="auth-card">
    <h1>Your account</h1>
    <p class="sub">Sign in to book and manage your stays.</p>
    <div class="toggle"><button id="t-in" class="active">Sign in</button><button id="t-up">Create account</button></div>
    <div id="up-name" style="display:none;"><label>Full name</label><input id="a-name" placeholder="Your name"></div>
    <label>Email</label><input id="a-email" type="email" placeholder="you@example.com">
    <label>Password</label><input id="a-pass" type="password" placeholder="••••••••">
    <button class="btn" id="a-go">Sign in →</button>
    <div class="msg" id="a-msg"></div>
  </div>

  <!-- Signed-in: my bookings -->
  <div class="card" id="acc-card" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div><h1 id="hi">My stays</h1><p class="sub" id="who">—</p></div>
      <a class="link" id="signout">Sign out</a>
    </div>
    <a class="btn" href="bookings.html">Book a new stay →</a>
    <div id="mybookings" style="margin-top:8px;"></div>
    <p class="sub" id="admin-link" style="display:none;margin-top:16px;">You’re an admin — <a class="link" href="admin-bookings.html">open the booking dashboard →</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="booking-config.js"></script>
<script>
const sb = window.supabase.createClient(window.BARHAM_SUPABASE_URL, window.BARHAM_SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);
let mode='in';
$('t-in').onclick=()=>setMode('in'); $('t-up').onclick=()=>setMode('up');
function setMode(m){ mode=m; $('t-in').classList.toggle('active',m==='in'); $('t-up').classList.toggle('active',m==='up');
  $('up-name').style.display=m==='up'?'block':'none'; $('a-go').textContent=m==='up'?'Create account →':'Sign in →'; msg(''); }
function msg(t,k){ const e=$('a-msg'); if(!t){e.style.display='none';return;} e.textContent=t; e.className='msg '+(k||'err'); }

$('a-go').onclick=async ()=>{
  const email=$('a-email').value.trim(), pass=$('a-pass').value;
  if(!email||!pass){ msg('Enter your email and password.'); return; }
  $('a-go').disabled=true;
  if(mode==='up'){
    const { data, error } = await sb.auth.signUp({ email, password:pass, options:{ data:{ full_name:$('a-name').value.trim() } } });
    $('a-go').disabled=false;
    if(error){ msg(error.message); return; }
    if(data && data.session){ showAccount(); return; }   // signed in immediately (no email confirmation)
    msg('Account created — check your email to verify, then sign in.','ok'); setMode('in');
  } else {
    const { error } = await sb.auth.signInWithPassword({ email, password:pass });
    $('a-go').disabled=false;
    if(error){ msg(error.message); return; }
    showAccount();
  }
};
$('signout').onclick=async ()=>{ await sb.auth.signOut(); location.reload(); };

async function showAccount(){
  const { data } = await sb.auth.getSession(); const s=data.session;
  if(!s){ $('auth-card').style.display='block'; $('acc-card').style.display='none'; return; }
  $('auth-card').style.display='none'; $('acc-card').style.display='block';
  const { data:p } = await sb.from('profiles').select('*').eq('id',s.user.id).single();
  $('who').textContent = s.user.email;
  if(p && p.role==='admin') $('admin-link').style.display='block';
  const { data:bk } = await sb.from('bookings').select('*').eq('user_id',s.user.id).order('check_in',{ascending:true});
  const box=$('mybookings'); box.innerHTML='';
  if(!bk || !bk.length){ box.innerHTML='<p class="sub" style="margin-top:14px;">No stays yet.</p>'; return; }
  const W=window.BARHAM_WATERS;
  bk.forEach(b=>{
    const el=document.createElement('div'); el.className='bk';
    const wn = W[b.water]?W[b.water].name:b.water;
    el.innerHTML=`<div class="top"><span>${wn}</span><span class="pill ${b.status}">${b.status}</span></div>
      <div class="meta">${fmt(b.check_in)} → ${fmt(b.check_out)} · ${b.nights} nights · ${b.anglers} anglers</div>
      <div class="row"><span class="meta">${window.BARHAM.money(b.price)} · deposit ${b.payment_status==='deposit_paid'?'paid ✓':window.BARHAM.money(b.deposit)+' due'}</span></div>`;
    box.appendChild(el);
  });
}
function fmt(s){ return new Date(s+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
showAccount();
</script>
</body>
</html>
